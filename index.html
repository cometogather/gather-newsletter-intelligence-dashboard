<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Gather Content Intelligence Dashboard</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"><\/script>
<style>
  :root {
    --red: #C8371A;
    --red-light: #f5e8e4;
    --red-mid: #e8c4b8;
    --dark: #1a1a1a;
    --mid: #555;
    --muted: #888;
    --border: #e2e2e2;
    --bg: #f9f8f6;
    --white: #fff;
    --heat-0: #fff8f6;
    --heat-1: #fde8e1;
    --heat-2: #f9c4b0;
    --heat-3: #f29878;
    --heat-4: #e66a44;
    --heat-5: #C8371A;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: Arial, Helvetica, sans-serif; background: var(--bg); color: var(--dark); }

  /* ── GATE ── */
  #gate {
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    background: var(--dark);
  }
  .gate-card {
    background: var(--white);
    border-radius: 4px;
    padding: 52px 48px 44px;
    width: 380px;
    text-align: center;
    box-shadow: 0 8px 40px rgba(0,0,0,0.28);
  }
  .gate-card img { height: 36px; margin-bottom: 28px; }
  .gate-card h2 {
    font-family: Georgia, 'Times New Roman', serif;
    font-size: 1.15rem;
    font-weight: 400;
    color: var(--mid);
    margin-bottom: 28px;
    line-height: 1.5;
  }
  .gate-card input {
    width: 100%;
    padding: 12px 16px;
    border: 1.5px solid var(--border);
    border-radius: 3px;
    font-size: 1rem;
    margin-bottom: 14px;
    outline: none;
    transition: border-color .2s;
  }
  .gate-card input:focus { border-color: var(--red); }
  .gate-card button {
    width: 100%;
    padding: 13px;
    background: var(--red);
    color: #fff;
    border: none;
    border-radius: 3px;
    font-size: 0.95rem;
    letter-spacing: .06em;
    text-transform: uppercase;
    cursor: pointer;
    font-weight: 700;
    transition: filter .15s;
  }
  .gate-card button:hover { filter: brightness(1.1); }
  .gate-error {
    color: var(--red);
    font-size: 0.82rem;
    margin-top: 10px;
    min-height: 18px;
  }

  /* ── DASHBOARD ── */
  #dashboard { display: none; }

  .dash-header {
    background: var(--dark);
    padding: 18px 48px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    position: sticky;
    top: 0;
    z-index: 100;
  }
  .dash-header img { height: 28px; }
  .dash-header-meta {
    text-align: right;
    color: rgba(255,255,255,0.55);
    font-size: 0.78rem;
    line-height: 1.6;
  }
  .dash-header-meta strong { color: rgba(255,255,255,0.85); }

  .hero {
    background: var(--white);
    border-bottom: 1px solid var(--border);
    padding: 52px 48px 44px;
  }
  .hero-inner { max-width: 860px; }
  .hero-eyebrow {
    font-size: 0.72rem;
    letter-spacing: .14em;
    text-transform: uppercase;
    color: var(--red);
    font-weight: 700;
    margin-bottom: 14px;
  }
  .hero h1 {
    font-family: Georgia, 'Times New Roman', serif;
    font-size: 2.1rem;
    font-weight: 400;
    line-height: 1.25;
    color: var(--dark);
    margin-bottom: 20px;
  }
  .hero h1 em { font-style: italic; color: var(--red); }
  .hero p {
    font-size: 1.02rem;
    line-height: 1.72;
    color: var(--mid);
    margin-bottom: 14px;
    max-width: 780px;
  }
  .hero p:last-child { margin-bottom: 0; }
  .hero-callout {
    margin-top: 26px;
    padding: 18px 22px;
    background: var(--red-light);
    border-left: 3px solid var(--red);
    border-radius: 0 3px 3px 0;
    font-size: 0.92rem;
    color: var(--dark);
    line-height: 1.6;
  }
  .hero-callout strong { color: var(--red); }

  .section {
    padding: 44px 48px;
    border-bottom: 1px solid var(--border);
  }
  .section:last-child { border-bottom: none; }
  .section-label {
    font-size: 0.69rem;
    letter-spacing: .14em;
    text-transform: uppercase;
    color: var(--red);
    font-weight: 700;
    margin-bottom: 8px;
  }
  .section-title {
    font-family: Georgia, 'Times New Roman', serif;
    font-size: 1.45rem;
    font-weight: 400;
    color: var(--dark);
    margin-bottom: 6px;
  }
  .section-desc {
    font-size: 0.88rem;
    color: var(--muted);
    margin-bottom: 28px;
    line-height: 1.6;
    max-width: 680px;
  }

  /* KPI cards */
  .kpi-grid {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 16px;
    margin-bottom: 0;
  }
  .kpi-card {
    background: var(--white);
    border: 1px solid var(--border);
    border-radius: 4px;
    padding: 24px 22px 20px;
  }
  .kpi-label {
    font-size: 0.72rem;
    letter-spacing: .08em;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 8px;
  }
  .kpi-value {
    font-family: Georgia, 'Times New Roman', serif;
    font-size: 2.4rem;
    font-weight: 400;
    color: var(--dark);
    line-height: 1;
    margin-bottom: 6px;
  }
  .kpi-sub {
    font-size: 0.78rem;
    color: var(--muted);
    line-height: 1.4;
  }
  .kpi-card.accent { border-top: 3px solid var(--red); }

  /* Heat map */
  .heatmap-wrap { overflow-x: auto; }
  .heatmap {
    width: 100%;
    border-collapse: collapse;
    font-size: 0.83rem;
  }
  .heatmap th {
    padding: 10px 14px;
    text-align: left;
    font-size: 0.7rem;
    letter-spacing: .06em;
    text-transform: uppercase;
    color: var(--muted);
    font-weight: 700;
    border-bottom: 2px solid var(--border);
    white-space: nowrap;
  }
  .heatmap th:first-child { min-width: 160px; }
  .heatmap td {
    padding: 11px 14px;
    text-align: center;
    border-bottom: 1px solid var(--border);
    font-weight: 600;
    font-size: 0.82rem;
    min-width: 110px;
  }
  .heatmap td:first-child {
    text-align: left;
    font-weight: 600;
    font-size: 0.85rem;
    color: var(--dark);
  }
  .heatmap tr:last-child td { border-bottom: none; }
  .heat-0 { background: var(--heat-0); color: #ccc; }
  .heat-1 { background: var(--heat-1); color: #c8773a; }
  .heat-2 { background: var(--heat-2); color: #b05020; }
  .heat-3 { background: var(--heat-3); color: #fff; }
  .heat-4 { background: var(--heat-4); color: #fff; }
  .heat-5 { background: var(--heat-5); color: #fff; }
  .heatmap-legend {
    display: flex;
    align-items: center;
    gap: 6px;
    margin-top: 14px;
    font-size: 0.74rem;
    color: var(--muted);
  }
  .legend-swatch {
    width: 18px;
    height: 10px;
    border-radius: 2px;
    display: inline-block;
  }

  /* Campaign cards */
  .campaign-grid {
    display: grid;
    grid-template-columns: repeat(2, 1fr);
    gap: 18px;
  }
  .campaign-card {
    background: var(--white);
    border: 1px solid var(--border);
    border-radius: 4px;
    padding: 24px 24px 20px;
  }
  .campaign-card-header {
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
    margin-bottom: 16px;
  }
  .campaign-num {
    font-size: 0.68rem;
    letter-spacing: .12em;
    text-transform: uppercase;
    color: var(--red);
    font-weight: 700;
    margin-bottom: 4px;
  }
  .campaign-title {
    font-family: Georgia, 'Times New Roman', serif;
    font-size: 1.08rem;
    font-weight: 400;
    color: var(--dark);
    line-height: 1.3;
    max-width: 240px;
  }
  .campaign-badge {
    font-size: 0.7rem;
    padding: 3px 9px;
    border-radius: 20px;
    white-space: nowrap;
    font-weight: 700;
    letter-spacing: .04em;
  }
  .badge-strong { background: #e8f5e9; color: #2e7d32; }
  .badge-good { background: #fff3e0; color: #e65100; }
  .campaign-stats {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 10px;
    padding: 14px 0;
    border-top: 1px solid var(--border);
    border-bottom: 1px solid var(--border);
    margin-bottom: 14px;
  }
  .cs-label {
    font-size: 0.66rem;
    letter-spacing: .06em;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 4px;
  }
  .cs-value {
    font-size: 1.15rem;
    font-weight: 700;
    color: var(--dark);
  }
  .cs-value.highlight { color: var(--red); }
  .campaign-meta {
    font-size: 0.8rem;
    color: var(--muted);
    line-height: 1.6;
  }
  .campaign-meta strong { color: var(--dark); }
  .campaign-persona-tag {
    display: inline-block;
    background: var(--red-light);
    color: var(--red);
    font-size: 0.7rem;
    font-weight: 700;
    padding: 2px 8px;
    border-radius: 3px;
    margin-right: 4px;
    margin-top: 6px;
  }

  /* Charts row */
  .chart-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 24px;
  }
  .chart-box {
    background: var(--white);
    border: 1px solid var(--border);
    border-radius: 4px;
    padding: 24px;
  }
  .chart-box-title {
    font-size: 0.78rem;
    letter-spacing: .07em;
    text-transform: uppercase;
    color: var(--muted);
    font-weight: 700;
    margin-bottom: 18px;
  }
  .chart-container { position: relative; height: 220px; }

  /* Hook analysis */
  .hook-grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 18px;
  }
  .hook-card {
    background: var(--white);
    border: 1px solid var(--border);
    border-radius: 4px;
    padding: 22px 20px;
  }
  .hook-icon {
    font-size: 1.6rem;
    margin-bottom: 10px;
  }
  .hook-name {
    font-size: 0.8rem;
    font-weight: 700;
    letter-spacing: .05em;
    text-transform: uppercase;
    color: var(--mid);
    margin-bottom: 6px;
  }
  .hook-rate {
    font-family: Georgia, 'Times New Roman', serif;
    font-size: 2rem;
    font-weight: 400;
    margin-bottom: 4px;
  }
  .hook-rate.best { color: var(--red); }
  .hook-bar-bg {
    height: 5px;
    background: var(--border);
    border-radius: 3px;
    margin: 10px 0 8px;
  }
  .hook-bar-fill {
    height: 5px;
    background: var(--red);
    border-radius: 3px;
  }
  .hook-desc {
    font-size: 0.8rem;
    color: var(--muted);
    line-height: 1.55;
  }

  /* Enablement matrix */
  .matrix-table {
    width: 100%;
    border-collapse: collapse;
    font-size: 0.84rem;
  }
  .matrix-table th {
    padding: 10px 16px;
    text-align: left;
    font-size: 0.7rem;
    letter-spacing: .08em;
    text-transform: uppercase;
    color: var(--muted);
    font-weight: 700;
    border-bottom: 2px solid var(--border);
    background: var(--bg);
  }
  .matrix-table td {
    padding: 13px 16px;
    border-bottom: 1px solid var(--border);
    vertical-align: top;
    line-height: 1.55;
  }
  .matrix-table tr:last-child td { border-bottom: none; }
  .matrix-table tr:hover td { background: var(--red-light); }
  .persona-pill {
    display: inline-block;
    font-size: 0.72rem;
    font-weight: 700;
    padding: 2px 10px;
    border-radius: 20px;
    background: var(--dark);
    color: #fff;
    margin-bottom: 2px;
  }
  .content-link {
    font-style: italic;
    color: var(--red);
    font-family: Georgia, serif;
  }
  .use-case { color: var(--mid); font-size: 0.82rem; }
  .send-score {
    display: inline-block;
    width: 8px; height: 8px;
    border-radius: 50%;
    margin-right: 3px;
  }
  .score-high { background: #2e7d32; }
  .score-med { background: #e65100; }

  /* Insights */
  .insights-grid {
    display: grid;
    grid-template-columns: repeat(2, 1fr);
    gap: 16px;
  }
  .insight-card {
    background: var(--white);
    border: 1px solid var(--border);
    border-radius: 4px;
    padding: 22px 22px 18px;
    border-left: 3px solid var(--red);
  }
  .insight-number {
    font-family: Georgia, serif;
    font-size: 2rem;
    color: var(--red);
    line-height: 1;
    margin-bottom: 8px;
  }
  .insight-text {
    font-size: 0.88rem;
    color: var(--mid);
    line-height: 1.6;
  }
  .insight-text strong { color: var(--dark); }

  .dash-footer {
    background: var(--dark);
    padding: 24px 48px;
    display: flex;
    align-items: center;
    justify-content: space-between;
  }
  .dash-footer img { height: 22px; opacity: 0.6; }
  .dash-footer p {
    font-size: 0.74rem;
    color: rgba(255,255,255,0.35);
  }

  @media (max-width: 900px) {
    .kpi-grid, .campaign-grid, .chart-grid, .hook-grid, .insights-grid {
      grid-template-columns: 1fr 1fr;
    }
    .section, .hero, .dash-header { padding-left: 24px; padding-right: 24px; }
  }
  @media (max-width: 600px) {
    .kpi-grid, .campaign-grid, .chart-grid, .hook-grid, .insights-grid {
      grid-template-columns: 1fr;
    }
  }
</style>
</head>

      <div class="hero-eyebrow">Thought Leadership + Paid Distribution Intelligence</div>
      <h1>When content meets <em>precision targeting,</em><br>every article becomes a sales asset.</h1>
      <p>Most B2B content programs end with a publish date. This dashboard shows what happens when you close the loop — combining targeted LinkedIn boost tactics with content analytics to understand not just what performs, but <strong>who it resonates with and why that matters for your pipeline.</strong></p>
      <p>The insight is counterintuitive: a modest monthly investment in LinkedIn-boosted distribution (typically $800–$2,000/month) doesn't just extend reach. It unlocks granular demographic data — by seniority, function, and company size — that transforms your content program from a brand play into a <strong>precision sales intelligence tool.</strong></p>
      <div class="hero-callout">
        <strong>The methodology:</strong> Each piece of thought leadership is boosted to two campaign types — a broad B2B tech audience and a hyper-targeted strategic prospect segment (VP+ at 5,000+ employee companies in enterprise technology, financial infrastructure, and adjacent sectors). The resulting engagement data tells us exactly which messages land with which leaders — and maps directly to pipeline priorities.

    <div class="section-label">Key Findings</div>
    <div class="section-title">What the Data Tells Us</div>
    <div class="section-desc">Five signals that should directly inform content strategy and pipeline activation priorities.</div>
    <div class="insights-grid">
      <div class="insight-card">
        <div class="insight-number">2.3×</div>
        <div class="insight-text"><strong>People-led narratives outperform abstract thought leadership by 2.3×</strong> across all seniority tiers. The single highest-leverage creative decision is leading with a specific person's experience — not a trend, not a framework.</div>
      </div>
      <div class="insight-card">
        <div class="insight-number">4×</div>
        <div class="insight-text"><strong>Strategic prospect boosts deliver 4× more pipeline-quality clicks</strong> than general audience boosts, at only 1.4× the cost. Hyper-targeted spend is the highest-ROI lever in the program.</div>
      </div>
      <div class="insight-card">
        <div class="insight-number">$0.70</div>
        <div class="insight-text"><strong>Average cost per quality engagement: $0.70</strong> — reaching a VP+ decision-maker at a 5,000+ employee company for less than a dollar. No other B2B channel comes close to this efficiency at this audience quality level.</div>
      </div>
      <div class="insight-card">
        <div class="insight-number">67%</div>
        <div class="insight-text"><strong>67% of AI strategy content engagers are at companies with 10,000+ employees.</strong> This is the highest-value segment for enterprise services — and it's being reached at scale with organic-feeling content, not display advertising.</div>
      </div>
      <div class="insight-card">
        <div class="insight-number">312</div>
        <div class="insight-text"><strong>312 identified decision-makers in target accounts engaged with content</strong> across the program. Each represents a warm outreach opportunity backed by a specific, relevant signal — what they engaged with tells you exactly how to start the conversation.</div>
      </div>
      <div class="insight-card">
        <div class="insight-number">→</div>
        <div class="insight-text"><strong>The compounding effect increases with each issue.</strong> As the content corpus grows and campaign targeting refines, cost-per-quality-engagement drops and resonance data becomes more predictive. The program pays for itself differently at issue 8 than at issue 2.</div>
      </div>

<script>
const HASH = 'be4b4b4ffee2644cc0c6662feafbfb2e84f67b0d87e42db0f33b426ae08fc122';

async function sha256(msg) {
  const buf = await crypto.subtle.digest('SHA-256', new TextEncoder().encode(msg));
  return Array.from(new Uint8Array(buf)).map(b => b.toString(16).padStart(2,'0')).join('');
}

async function unlock() {
  const val = document.getElementById('pw').value;
  const h = await sha256(val);
  if (h === HASH) {
    document.getElementById('gate').style.display = 'none';
    document.getElementById('dashboard').style.display = 'block';
    initCharts();
    sessionStorage.setItem('unlocked','1');
  } else {
    document.getElementById('gate-err').textContent = 'Incorrect password. Please try again.';
  }
}

function initCharts() {
  const red = '#C8371A';
  const reds = ['#C8371A','#e66a44','#f29878','#f9c4b0','#fde8e1','#fff8f6'];

  new Chart(document.getElementById('seniorityChart'), {
    type: 'bar',
    data: {
      labels: ['C-Suite', 'SVP / EVP', 'VP', 'Director', 'Senior Manager', 'Manager'],
      datasets: [{ label: 'Engagement share', data: [28, 19, 23, 17, 8, 5],
        backgroundColor: reds, borderRadius: 3, borderSkipped: false }]
    },
    options: {
      responsive: true, maintainAspectRatio: false,
      plugins: { legend: { display: false } },
      scales: {
        y: { grid: { color: '#f0f0f0' }, ticks: { callback: v => v + '%', font: { size: 11 } } },
        x: { grid: { display: false }, ticks: { font: { size: 11 } } }
      }
    }
  });

  new Chart(document.getElementById('functionChart'), {
    type: 'doughnut',
    data: {
      labels: ['Technology / Engineering', 'People & HR', 'Marketing', 'Strategy / Innovation', 'Finance / Ops', 'Other'],
      datasets: [{ data: [34, 24, 18, 14, 6, 4],
        backgroundColor: ['#C8371A','#e66a44','#f29878','#f9c4b0','#ccc','#e8e8e8'],
        borderWidth: 0, hoverOffset: 4 }]
    },
    options: {
      responsive: true, maintainAspectRatio: false,
      plugins: {
        legend: { position: 'right', labels: { font: { size: 11 }, padding: 12, boxWidth: 12 } }
      }
    }
  });
}

// Auto-unlock if session already authenticated
if (sessionStorage.getItem('unlocked') === '1') {
  document.getElementById('gate').style.display = 'none';
  document.getElementById('dashboard').style.display = 'block';
  window.addEventListener('load', initCharts);
}
</script>
