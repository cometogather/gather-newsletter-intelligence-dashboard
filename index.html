<!doctype html>
<html lang="en"><head>
<meta charset="utf-8">
<title>Gather — Client Newsletter Program Dashboard · Q1 2026</title>
<style>
:root{color-scheme:light;--o:#E8462A;--ch:#231F20;--cr:#FAF6F1;--ink:#1A1A1A;--soft:#6B6B6B;--line:#E8E4DE;--chip:#F3EFE9}
*{box-sizing:border-box;margin:0;padding:0}
html,body{background:var(--cr);color:var(--ink);font-family:'Helvetica Neue','Inter',-apple-system,BlinkMacSystemFont,Arial,sans-serif;line-height:1.45;font-size:15px}
.wrap{max-width:1160px;margin:0 auto;padding:40px 28px 80px}
header.hero{border-bottom:2px solid var(--ch);padding-bottom:28px;margin-bottom:28px}
.kicker{font-size:13px;letter-spacing:0.12em;text-transform:uppercase;color:var(--o);font-weight:700}
h1{font-size:34px;line-height:1.12;letter-spacing:-0.01em;margin:8px 0 14px;font-weight:700;color:var(--ch)}
.sub{color:var(--ink);font-size:15px;max-width:880px;line-height:1.6}
.sub strong{color:var(--ch)}
.kpis{display:grid;grid-template-columns:repeat(4,1fr);gap:14px;margin:22px 0 0}
.kpi{background:white;border:1px solid var(--line);border-radius:10px;padding:16px 18px}
.kpi .n{font-size:28px;font-weight:700;color:var(--o);line-height:1.05}
.kpi .l{font-size:12px;color:var(--soft);text-transform:uppercase;letter-spacing:0.08em;margin-top:4px}
.kpi .d{font-size:13px;color:var(--ink);margin-top:6px;line-height:1.4}
section{margin-top:36px}
h2{font-size:22px;letter-spacing:-0.005em;font-weight:700;color:var(--ch);margin-bottom:14px;display:flex;align-items:center;gap:10px}
h2::before{content:"";display:inline-block;width:6px;height:22px;background:var(--o);border-radius:2px}
.section-lede{font-size:13px;color:var(--soft);margin-bottom:16px;max-width:820px;line-height:1.55}
h3{font-size:16px;font-weight:700;margin-bottom:8px;color:var(--ch)}
.insights{display:grid;grid-template-columns:repeat(3,1fr);gap:16px}
.insight{background:white;border:1px solid var(--line);border-left:4px solid var(--o);padding:16px 18px;border-radius:10px}
